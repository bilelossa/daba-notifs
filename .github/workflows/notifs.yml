name: Notifications Daba

# Toutes les 15 min (UTC) : necessaire pour les rappels de validation de
# livraison. Le script decide lui-meme quoi envoyer selon l'heure marocaine. Le script decide lui-meme quoi envoyer selon l'heure
# marocaine + les conditions (meteo, matchs, inactivite...).
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # bouton "Run workflow" pour lancer a la main

jobs:
  notifs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Envoyer les notifications
        run: node notifs.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
