name: Notifications Daba
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}
jobs:
  notifs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Envoyer les notifications
        run: node notifs.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
